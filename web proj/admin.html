<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | FUI</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --card:      #1c2030;
      --border:    #252a38;
      --accent:    #4f8ef7;
      --accent2:   #6ee7b7;
      --warn:      #f87171;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --sidebar-w: 240px;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 100;
      transition: transform .3s ease;
    }
    .logo {
      padding: 24px 20px 18px;
      border-bottom: 1px solid var(--border);
    }
    .logo span {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -.3px;
    }
    .logo p {
      font-size: .7rem;
      color: var(--muted);
      margin-top: 2px;
    }
    nav { flex: 1; padding: 16px 12px; }
    nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: .85rem;
      font-weight: 500;
      margin-bottom: 4px;
      transition: background .2s, color .2s;
    }
    nav a:hover, nav a.active {
      background: rgba(79,142,247,.12);
      color: var(--accent);
    }
    nav a svg { flex-shrink: 0; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-size: .72rem;
      color: var(--muted);
    }

    /* ── MAIN ── */
    main {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 30px 28px;
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .topbar h1 { font-size: 1.4rem; font-weight: 600; }
    .topbar p  { font-size: .8rem; color: var(--muted); margin-top: 2px; }

    #menu-btn {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 1.1rem;
    }

    /* ── SUMMARY CARDS ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 18px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
    }
    .card.blue::before  { background: var(--accent); }
    .card.green::before { background: var(--accent2); }
    .card.red::before   { background: var(--warn); }
    .card.yellow::before{ background: #fbbf24; }

    .card-label {
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 8px;
    }
    .card-value {
      font-size: 1.9rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }
    .card.blue  .card-value { color: var(--accent); }
    .card.green .card-value { color: var(--accent2);}
    .card.red   .card-value { color: var(--warn);   }
    .card.yellow .card-value{ color: #fbbf24;       }

    /* ── ADD FORM ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-header h2 { font-size: 1rem; font-weight: 600; }

    #toggle-form-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity .2s;
    }
    #toggle-form-btn:hover { opacity: .85; }

    #add-form-wrapper {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      margin-bottom: 24px;
      display: none;
      animation: slideDown .25s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #add-form-wrapper.open { display: block; }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: .75rem;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: .83rem;
      padding: 9px 12px;
      border-radius: 7px;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--accent); }

    .form-group select option { background: var(--surface); }

    #submit-btn {
      background: var(--accent2);
      border: none;
      color: #0d0f14;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: .83rem;
      padding: 9px 22px;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity .2s;
    }
    #submit-btn:hover { opacity: .85; }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .table-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }
    .table-toolbar span { font-size: .85rem; font-weight: 600; }
    #search-input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: .8rem;
      padding: 7px 12px;
      border-radius: 7px;
      outline: none;
      width: 200px;
      transition: border-color .2s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--muted); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .83rem;
    }
    thead { background: var(--surface); }
    thead th {
      text-align: left;
      padding: 12px 16px;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      font-weight: 600;
    }
    tbody tr {
      border-top: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody td { padding: 13px 16px; }

    .badge {
      display: inline-block;
      font-size: .68rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .badge.active   { background: rgba(110,231,183,.15); color: var(--accent2); }
    .badge.inactive { background: rgba(248,113,113,.15); color: var(--warn); }
    .badge.pending  { background: rgba(251,191,36,.15);  color: #fbbf24; }

    .del-btn {
      background: rgba(248,113,113,.15);
      border: none;
      color: var(--warn);
      font-family: 'Sora', sans-serif;
      font-size: .75rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .2s;
    }
    .del-btn:hover { background: rgba(248,113,113,.3); }

    .empty-row td {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: .85rem;
    }

    /* ── OVERLAY (mobile) ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 99;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      #sidebar { transform: translateX(-100%); }
      #sidebar.open { transform: translateX(0); }
      #overlay.show { display: block; }
      main { margin-left: 0; padding: 20px 16px; }
      #menu-btn { display: block; }
      #search-input { width: 140px; }
    }
  </style>
</head>
<body>

<!-- Overlay -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside id="sidebar">
  <div class="logo">
    <span>⚙ AdminPanel</span>
    <p>Foundation University ISD</p>
  </div>
  <nav>
    <a href="#" class="active">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="#">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Students
    </a>
    <a href="#">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Courses
    </a>
    <a href="#">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Reports
    </a>
    <a href="#">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Settings
    </a>
    <a href="student.html">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Student View →
    </a>
  </nav>
  <div class="sidebar-footer">Logged in as <strong>Admin</strong></div>
</aside>

<!-- Main Content -->
<main>
  <div class="topbar">
    <div>
      <button id="menu-btn" onclick="toggleSidebar()">☰</button>
    </div>
    <div>
      <h1>Admin Dashboard</h1>
      <p id="date-display"></p>
    </div>
    <div style="font-size:.8rem; color:var(--muted);">SP-2026 &nbsp;|&nbsp; Section B</div>
  </div>

  <!-- Summary Cards -->
  <div class="cards">
    <div class="card blue">
      <div class="card-label">Total Students</div>
      <div class="card-value" id="c-total">0</div>
    </div>
    <div class="card green">
      <div class="card-label">Active</div>
      <div class="card-value" id="c-active">0</div>
    </div>
    <div class="card red">
      <div class="card-label">Inactive</div>
      <div class="card-value" id="c-inactive">0</div>
    </div>
    <div class="card yellow">
      <div class="card-label">Pending</div>
      <div class="card-value" id="c-pending">0</div>
    </div>
  </div>

  <!-- Add Student -->
  <div class="section-header">
    <h2>Student Records</h2>
    <button id="toggle-form-btn" onclick="toggleForm()">+ Add Student</button>
  </div>

  <div id="add-form-wrapper">
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="f-name" placeholder="e.g. Ahmed Raza" />
      </div>
      <div class="form-group">
        <label>Student ID</label>
        <input type="text" id="f-id" placeholder="e.g. BSIET-001" />
      </div>
      <div class="form-group">
        <label>Course</label>
        <input type="text" id="f-course" placeholder="e.g. Web Technologies" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
          <option value="Pending">Pending</option>
        </select>
      </div>
    </div>
    <button id="submit-btn" onclick="addStudent()">Add to Table</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-toolbar">
      <span>All Students</span>
      <input type="text" id="search-input" placeholder="Search by name..." oninput="filterTable()" />
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Student ID</th>
          <th>Course</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="student-tbody"></tbody>
    </table>
  </div>
</main>

<script>
  // ── INITIAL SEED DATA
  let students = [
    { name: "Sara Khan",    id: "BSIET-101", course: "Web Technologies", status: "Active"   },
    { name: "Ali Hassan",   id: "BSIET-102", course: "Data Structures",   status: "Active"   },
    { name: "Zara Malik",   id: "BSIET-103", course: "OOP with Java",     status: "Inactive" },
    { name: "Usman Tariq",  id: "BSIET-104", course: "Web Technologies", status: "Pending"  },
    { name: "Hina Baig",    id: "BSIET-105", course: "Database Systems",  status: "Active"   },
  ];

  // ── DATE
  const d = new Date();
  document.getElementById("date-display").textContent =
    d.toLocaleDateString("en-PK", { weekday:"long", year:"numeric", month:"long", day:"numeric" });

  // ── RENDER TABLE
  function renderTable(data) {
    const tbody = document.getElementById("student-tbody");
    tbody.innerHTML = "";

    if (data.length === 0) {
      tbody.innerHTML = `<tr class="empty-row"><td colspan="6">No students found.</td></tr>`;
    } else {
      data.forEach((s, i) => {
        const statusClass = s.status.toLowerCase();
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td style="color:var(--muted);font-family:'JetBrains Mono',monospace">${i + 1}</td>
          <td><strong>${s.name}</strong></td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:.78rem;">${s.id}</td>
          <td>${s.course}</td>
          <td><span class="badge ${statusClass}">${s.status}</span></td>
          <td><button class="del-btn" onclick="deleteStudent('${s.id}')">Delete</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    updateCards();
  }

  // ── UPDATE SUMMARY CARDS
  function updateCards() {
    document.getElementById("c-total").textContent   = students.length;
    document.getElementById("c-active").textContent  = students.filter(s => s.status === "Active").length;
    document.getElementById("c-inactive").textContent= students.filter(s => s.status === "Inactive").length;
    document.getElementById("c-pending").textContent = students.filter(s => s.status === "Pending").length;
  }

  // ── ADD STUDENT
  function addStudent() {
    const name   = document.getElementById("f-name").value.trim();
    const sid    = document.getElementById("f-id").value.trim();
    const course = document.getElementById("f-course").value.trim();
    const status = document.getElementById("f-status").value;

    if (!name || !sid || !course) {
      alert("Please fill in all fields before adding.");
      return;
    }

    if (students.find(s => s.id === sid)) {
      alert("A student with this ID already exists.");
      return;
    }

    students.push({ name, id: sid, course, status });
    document.getElementById("f-name").value = "";
    document.getElementById("f-id").value   = "";
    document.getElementById("f-course").value = "";

    renderTable(students);
    toggleForm(); // close form
  }

  // ── DELETE STUDENT
  function deleteStudent(sid) {
    if (!confirm("Are you sure you want to remove this student?")) return;
    students = students.filter(s => s.id !== sid);
    renderTable(students);
  }

  // ── FILTER / SEARCH
  function filterTable() {
    const q = document.getElementById("search-input").value.toLowerCase();
    const filtered = students.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.id.toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  // ── TOGGLE FORM
  function toggleForm() {
    document.getElementById("add-form-wrapper").classList.toggle("open");
  }

  // ── SIDEBAR (mobile)
  function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("overlay").classList.toggle("show");
  }
  function closeSidebar() {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("overlay").classList.remove("show");
  }

  // ── INIT
  renderTable(students);
</script>
</body>
</html>
